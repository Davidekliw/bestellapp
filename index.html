<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liefer App</title>
    <link rel="stylesheet" href="styles/fonts.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="styles/meals.css">
    <link rel="stylesheet" href="styles/basket.css">
    <link rel="stylesheet" href="styles/userInormations.css">
    <script src="scripts/db.js"></script>
    <script src="scripts/template.js"></script>
    <script src="scripts/styling.js"></script>
    <script src="script.js"></script>
    <link rel="icon" type="image/x-icon" href="favicon.png">
</head>

<body onload="renderAllMeals()">
    <header>
        <div class="headContainer">
            <img src="assets/img/logo1.png" alt="">
            <div onclick="toggleBurgerMenu()" id="burgerMenu" class="burgerMenu">
                <div id="lineA" class="line"></div>
                <div id="lineB" class="line"></div>
                <div id="lineC" class="line"></div>
            </div>
        </div>
    </header>
    <main>
        <section class="hero">
            <div class="atfImg"></div>
            <div class="headLine">
                <div class="circle">
                    <img class="circleImg" src="assets/img/food_small_3.jpg" alt="">
                </div>
                <h1>BurgerHouse</h1>
                <h2>The best of Burgers, Pizza and Greens, all in one great place.</h2>
            </div>
        </section>
        <div class="contentBox">
            <section class="mealsSection" id="meal">
            </section>
            <div class="bottomMobileMenu">
                <img src="assets/icons/home.png" alt="">
                <img src="assets/icons/user.png" alt="">
                <img src="assets/icons/mealbag.png" alt="">
                <div class="cart">
                    <img onclick="toggleBasket()" src="assets/icons/basket.png" alt="">
                    <span class="badge" id="cartCount">0</span>
                </div>
            </div>
            <div class="basket" id="basket">
                <div class="posRel">
                    <h5 class="basketTitle">Your Basket</h5>
                    <img onclick="toggleBasket()" class="closeIcon" src="assets/icons/close.png" alt="">
                </div>
                <div class="emptyBasked" id="emptyBasked">
                    <div class="basketTextBox">
                        <p>Nothing here yet.</p>
                        <p>Go ahead and choose something</p>
                        <p>delicious!</p>
                    </div>
                    <img src="assets/icons/basket_creme.png" alt="">
                </div>
                <div class="basketContent" id="basketContent"></div>
            </div>
        </div>
        <div class="overlay dNone" id="overlay">
            <div class="confirmBox">
                <div class="alignRight">
                    <img onclick="closeMsg()" src="assets/icons/close.png" alt="">
                </div>
                <div class="confirmedMsgBox">
                    <img src="assets/icons/car.png" alt="">
                    <div class="confirmedMsg">
                        <div class="upperText">Order confirmed!</div>
                        <div class="lowerText">Your food is on the way!</div>
                    </div>
                </div>
            </div>
        </div>
        </div>
    </main>
    <footer>
        <div class="footerBox">
            <a href="">205 BurgerHouse</a>
            <a href="">imprint</a>
            <a href="">Cooki Preferences</a>
        </div>
    </footer>

</body>

</html>
